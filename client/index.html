<!doctype html>
<html lang="vi" class="app-loading">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camp</title>
    <style>
      html.app-loading, html.app-loading body { margin:0;padding:0;overflow:hidden;height:100%; }
      html.app-loading #root { height:100%; overflow:hidden; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div id="app-loading" style="height:100%;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;background:#0c0c10;overflow:hidden">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1rem">
          <div style="width:4rem;height:4rem;border-radius:0.5rem;background:#6366F1;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(99,102,241,0.2)">
            <span style="color:white;font-size:1.5rem;font-weight:700">C</span>
          </div>
          <h1 style="font-size:1.25rem;font-weight:600;color:white;letter-spacing:-0.02em">Camp</h1>
        </div>
        <div style="width:2rem;height:2rem;border:2px solid rgba(99,102,241,0.3);border-top-color:#6366F1;border-radius:9999px;animation:spin 0.8s linear infinite"></div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
