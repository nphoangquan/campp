# ============================================================
# nginx.conf — Cấu hình nginx cho React SPA + API proxy
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Thư mục chứa file tĩnh React (sau vite build)
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # Proxy /api → backend container (port 5000)
    # Thay thế Vite dev proxy khi chạy production trong Docker
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # Proxy /socket.io → backend container (WebSocket support)
    # Upgrade header cần thiết cho WebSocket handshake
    # ----------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ----------------------------------------------------------
    # SPA fallback: mọi route khác → index.html
    # React Router xử lý routing phía client
    # Nếu không có dòng này, F5 ở /dashboard sẽ bị 404
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache file tĩnh (JS, CSS, ảnh) — giảm tải server
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
