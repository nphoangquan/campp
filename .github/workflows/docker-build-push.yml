# ============================================================
# GitHub Actions — Build & push Docker images lên Docker Hub
#
# Nhánh kích hoạt tự động: infra/docker (không đụng main)
#
# Cấu hình bắt buộc (repo → Settings → Secrets and variables → Actions):
#   Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Variables (tuỳ chọn): VITE_API_URL_CI, VITE_SOCKET_URL_CI
# ============================================================

name: Docker Build & Push

on:
  push:
    branches:
      - infra/docker
    tags:
      - 'v*'
  pull_request:
    branches:
      - infra/docker
  workflow_dispatch:

env:
  IMAGE_OWNER: nphoangquan

jobs:
  server:
    name: camp-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OWNER }}/camp-server
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/infra/docker' }}
            type=sha,format=short,prefix=,suffix=
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  client:
    name: camp-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_OWNER }}/camp-client
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/infra/docker' }}
            type=sha,format=short,prefix=,suffix=
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL_CI || '/api' }}
            VITE_SOCKET_URL=${{ vars.VITE_SOCKET_URL_CI || 'http://localhost:5000' }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client


  # =========================
  # DEPLOY (AFTER CLIENT)
  # =========================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: client  

    steps:
      - name: Deploy Client
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}?repo=nphoangquan/camp-client&tag=latest&slot=4&container_port=80"

      - name: Deploy Server
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}?repo=nphoangquan/camp-server&tag=latest&slot=5&container_port=5000"
