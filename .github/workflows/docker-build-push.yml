name: Docker Build & Push

on:
  push:
    branches:
      - infra/docker
  workflow_dispatch:

env:
  IMAGE_OWNER: nphoangquan

jobs:
  # =========================
  # BUILD SERVER (RUN FIRST)
  # =========================
  server:
    name: Build Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Server
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            nphoangquan/camp-server:latest

  # =========================
  # BUILD CLIENT (AFTER SERVER)
  # =========================
  client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: server   

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            nphoangquan/camp-client:latest

  # =========================
  # DEPLOY (AFTER CLIENT)
  # =========================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: client  

    steps:
      - name: Deploy Client
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}?repo=nphoangquan/camp-client&tag=latest&slot=4&container_port=80"

      - name: Deploy Server
        run: |
          curl -X POST "${{ secrets.DEPLOY_URL }}?repo=nphoangquan/camp-server&tag=latest&slot=5&container_port=5000"
